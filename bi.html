    <iframe 
        id="biFrame"
       src="https://app.powerbi.com/view?r=eyJrIjoiZjM5OTczNWUtODMyMy00OTcxLWJjYzctYTU4MDM2NzU4YmVhIiwidCI6Ijk2MmVhZGVkLTJmNWYtNDE3Zi1iNTlkLTg2NTQwOTJmMzBhNiIsImMiOjh9"
        allowfullscreen>
    </iframe>

    <script>
        const REFRESH_TIME = 300000; // 5 minutos (300.000 ms)

        const frame = document.getElementById("biFrame");
        const loading = document.getElementById("loading");

        // Esconde loader após carregar
        frame.onload = () => {
            loading.style.display = "none";
        };

        // Auto reload
        setInterval(() => {
            loading.style.display = "flex";
            frame.src = frame.src;
        }, REFRESH_TIME);
    </script>
